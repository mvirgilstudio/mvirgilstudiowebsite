    <!-- Scripts -->

    <!-- MediaPipe Tasks Vision CDN -->
    <script type="module">

        // Translation support
        let currentLang = 'EN';
        const dictionary = {
            'EN': {
                'category': 'Category',
                'variant': 'Variant',
                'drag_rotate': 'DRAG TO ROTATE SCENE',
                'initializing': 'Initializing AI Engine...',
                'setup_complete': 'Setup Complete • Show hand to track',
                'pinch_rotate': 'Pinch to Rotate • Open hand to click',
                'show_hand': 'Show hand to track',
                'failed_load': 'Camera or model failed to load',
                'use_webcam': 'use your webcam and play with hands',
                'exit_experience': 'Exit Experience',
                'bedroom': 'Bedroom',
                'kitchen': 'Kitchen',
                'livingroom': 'Living Room',
                'exterior': 'Exterior',
                'interior': 'Interior'
            },
            'PT': {
                'category': 'Categoria',
                'variant': 'Variante',
                'drag_rotate': 'ARRASTE PARA RODAR A CENA',
                'initializing': 'A Inicializar o Motor de IA...',
                'setup_complete': 'Configuração Concluída • Mostre a mão para detetar',
                'pinch_rotate': 'Faça Pinça para Rodar • Abra a mão para clicar',
                'show_hand': 'Mostre a mão para detetar',
                'failed_load': 'Falha ao carregar a câmara ou o modelo',
                'use_webcam': 'use a sua câmara e jogue com as mãos',
                'exit_experience': 'Sair da Experiência',
                'bedroom': 'Quarto',
                'kitchen': 'Cozinha',
                'livingroom': 'Sala de Estar',
                'exterior': 'Exterior',
                'interior': 'Interior'
            }
        };

        function translate(key) {
            return dictionary[currentLang][key] || key;
        }

        function updateIframeLanguage() {
            // Translate instruction text based on current state
            if (handTrackingActive) {
                if (handDetected) {
                    if (handPos && handPos.isPinching) {
                        // Pinch rotation active
                    } else {
                        instructionText.innerText = translate('pinch_rotate');
                    }
                } else {
                    if (instructionText.innerText.includes('Initializing') || instructionText.innerText.includes('Inicializar')) {
                        instructionText.innerText = translate('initializing');
                    } else if (instructionText.innerText.includes('Setup') || instructionText.innerText.includes('Configuração')) {
                        instructionText.innerText = translate('setup_complete');
                    } else if (instructionText.innerText.includes('Camera') || instructionText.innerText.includes('Falha')) {
                        instructionText.innerText = translate('failed_load');
                    } else {
                        instructionText.innerText = translate('show_hand');
                    }
                }
            } else {
                instructionText.innerText = translate('drag_rotate');
            }

            // Translate webcam button text
            if (handTrackingActive) {
                webcamBtnText.innerText = translate('exit_experience');
            } else {
                webcamBtnText.innerText = translate('use_webcam');
            }

            // Rerender categories to update their labels
            renderCategories();

            // Translate panels text if needed
            const catHeader = document.querySelector('#panel-content span:first-child');
            if (catHeader) catHeader.innerText = translate('category').toUpperCase();
            const varHeader = document.querySelector('#panel-content div.shrink-0 span:first-child');
            if (varHeader) varHeader.innerText = translate('variant').toUpperCase();
        }

        // Constants Data mapping
        const PROJECT_DATA = {
            house: {
                categories: ['bedroom', 'kitchen', 'livingroom'],
                variants: {
                    bedroom: [
                        { id: 'b01', btn: 'assets/house/s_bedroom_01_bttn.jpg', sphere: 'assets/house/bedroom_01.jpg', label: 'BDRM-01' },
                        { id: 'b02', btn: 'assets/house/s_bedroom_02_bttn.jpg', sphere: 'assets/house/bedroom_02.jpg', label: 'BDRM-02' },
                        { id: 'b03', btn: 'assets/house/s_bedroom_03_bttn.jpg', sphere: 'assets/house/bedroom_03.jpg', label: 'BDRM-03' },
                    ],
                    kitchen: [
                        { id: 'k01', btn: 'assets/house/s_kitchen_01_bttn.jpg', sphere: 'assets/house/kitchen_01.jpg', label: 'KTCH-01' },
                        { id: 'k02', btn: 'assets/house/s_kitchen_02_bttn.jpg', sphere: 'assets/house/kitchen_02.jpg', label: 'KTCH-02' },
                        { id: 'k03', btn: 'assets/house/s_kitchen_03_bttn.jpg', sphere: 'assets/house/kitchen_03.jpg', label: 'KTCH-03' },
                    ],
                    livingroom: [
                        { id: 'l01', btn: 'assets/house/s_livingroom_01_bttn.jpg', sphere: 'assets/house/livingroom_01.jpg', label: 'LVRM-01' },
                        { id: 'l02', btn: 'assets/house/s_livingroom_02_bttn.jpg', sphere: 'assets/house/livingroom_02.jpg', label: 'LVRM-02' },
                        { id: 'l03', btn: 'assets/house/s_livingroom_03_bttn.jpg', sphere: 'assets/house/livingroom_03.jpg', label: 'LVRM-03' },
                    ]
                }
            },
            tent: {
                categories: ['exterior', 'interior'],
                variants: {
                    interior: [
                        { id: 't01', btn: 'assets/tent/int_01.jpg', sphere: 'assets/tent/int_panoram_04.jpg', label: 'TENT-INT' }
                    ],
                    exterior: [
                        { id: 't02', btn: 'assets/tent/10.jpg', sphere: 'assets/tent/ext_panorama_10.jpg', label: 'TENT-EXT' }
                    ]
                }
            },
            bridge_garden: {
                categories: ['bedroom', 'kitchen', 'livingroom'],
                variants: {
                    bedroom: [
                        { id: 'bb01', btn: 'assets/house ponte jardim/latlong/pan_bedroom_01.jpg', sphere: 'assets/house ponte jardim/latlong/pan_bedroom_01.jpg', label: 'BDRM-01' },
                        { id: 'bb02', btn: 'assets/house ponte jardim/latlong/pan_bedroom_02.jpg', sphere: 'assets/house ponte jardim/latlong/pan_bedroom_02.jpg', label: 'BDRM-02' },
                        { id: 'bb03', btn: 'assets/house ponte jardim/latlong/pan_bedroom_03.jpg', sphere: 'assets/house ponte jardim/latlong/pan_bedroom_03.jpg', label: 'BDRM-03' },
                    ],
                    kitchen: [
                        { id: 'bk01', btn: 'assets/house ponte jardim/latlong/pan_kitchen_01.jpg', sphere: 'assets/house ponte jardim/latlong/pan_kitchen_01.jpg', label: 'KTCH-01' },
                        { id: 'bk02', btn: 'assets/house ponte jardim/latlong/pan_kitchen_02.jpg', sphere: 'assets/house ponte jardim/latlong/pan_kitchen_02.jpg', label: 'KTCH-02' },
                        { id: 'bk03', btn: 'assets/house ponte jardim/latlong/pan_kitchen_03.jpg', sphere: 'assets/house ponte jardim/latlong/pan_kitchen_03.jpg', label: 'KTCH-03' },
                    ],
                    livingroom: [
                        { id: 'bl01', btn: 'assets/house ponte jardim/latlong/pan_livingroom_01.jpg', sphere: 'assets/house ponte jardim/latlong/pan_livingroom_01.jpg', label: 'LVRM-01' },
                        { id: 'bl02', btn: 'assets/house ponte jardim/latlong/pan_livingroom_02.jpg', sphere: 'assets/house ponte jardim/latlong/pan_livingroom_02.jpg', label: 'LVRM-02' },
                        { id: 'bl03', btn: 'assets/house ponte jardim/latlong/pan_livingroom_03.jpg', sphere: 'assets/house ponte jardim/latlong/pan_livingroom_03.jpg', label: 'LVRM-03' },
                    ]
                }
            }
        };

        // Get URL parameter for project selection
        const urlParams = new URLSearchParams(window.location.search);
        const currentProject = urlParams.get('project') || 'house';
        const projectConfig = PROJECT_DATA[currentProject] || PROJECT_DATA['house'];

        // State Variables
        let currentCategory = projectConfig.categories[0];
        let currentTextureUrl = projectConfig.variants[currentCategory][0].sphere;
        let handTrackingActive = false;
        let menuOpen = false;
        let landmarker = null;
        let webcamStream = null;
        let rafId = null;

        // ThreeJS variables
        let scene, camera, renderer, controls, sphereMesh, textureLoader;

        // DOM Elements
        const canvasContainer = document.getElementById('canvas-container');
        const getElement = (id, parentId) => {
            if (window.parent && window.parent.document) {
                const el = window.parent.document.getElementById(parentId || id);
                if (el) return el;
            }
            return document.getElementById(id);
        };

        const webcamPanel = getElement('webcam-panel', 'parent-webcam-panel');
        const webcamVideo = getElement('webcam-video', 'webcam-video');
        const webcamLoader = getElement('webcam-loader', 'parent-webcam-loader');
        const loaderCircle = getElement('loader-circle', 'parent-loader-circle');
        const loaderPercentage = getElement('loader-percentage', 'parent-loader-percentage');
        const statusIndicator = getElement('status-indicator', 'parent-status-indicator');
        const statusLabel = getElement('status-label', 'parent-status-label');
        const webcamToggleBtn = document.getElementById('webcam-toggle-btn');
        const webcamBtnText = document.getElementById('webcam-btn-text');
        const pingRing = document.getElementById('ping-ring');
        const instructionToast = document.getElementById('instruction-toast');
        const instructionText = document.getElementById('instruction-text');
        const controlPanel = document.getElementById('control-panel');
        const panelCollapseBtn = document.getElementById('panel-collapse-btn');
        const collapseIcon = document.getElementById('collapse-icon');
        const envContainer = document.getElementById('env-thumbnails-container');
        const virtualCursor = document.getElementById('virtual-cursor');
        const cursorRing = document.getElementById('cursor-ring');
        const cursorProgress = document.getElementById('cursor-progress');

        // Track hand position state
        let handPos = null; // { x, y, isPinching }
        let handDetected = false;

        // Dwell click properties
        let hoverElement = null;
        let hoverStartTime = 0;
        let lastClickTime = 0;

        // Initialize Three.js
        function initThree() {
            scene = new THREE.Scene();

            // Camera centered inside the sphere
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0.1);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            canvasContainer.appendChild(renderer.domElement);

            // Orbit controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = false;
            controls.enablePan = false;
            controls.rotateSpeed = -0.4;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            // Load initial texture and create sphere mesh
            textureLoader = new THREE.TextureLoader();
            loadPanorama(currentTextureUrl);

            // Resize listener
            window.addEventListener('resize', onWindowResize);

            // Start loop
            animate();
        }

        function loadPanorama(url) {
            textureLoader.load(
                url,
                (texture) => {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    texture.colorSpace = THREE.SRGBColorSpace;

                    if (sphereMesh) {
                        sphereMesh.material.map = texture;
                        sphereMesh.material.needsUpdate = true;
                    } else {
                        const geometry = new THREE.SphereGeometry(500, 64, 64);
                        // Invert geometry so faces point inward
                        geometry.scale(-1, 1, 1);
                        const material = new THREE.MeshBasicMaterial({ map: texture });
                        sphereMesh = new THREE.Mesh(geometry, material);
                        scene.add(sphereMesh);
                    }
                },
                undefined,
                (err) => {
                    console.error('[ThreeJS] Failed to load panorama texture:', url, err);
                }
            );
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let clock = new THREE.Clock();
        let targetRotationY = 0;
        let targetRotationX = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (handTrackingActive && handPos) {
                // If hand tracking is active, rotate camera based on pinch mapping
                if (handPos.isPinching) {
                    if (window.lastPinchPos) {
                        const dx = handPos.x - window.lastPinchPos.x;
                        const dy = handPos.y - window.lastPinchPos.y;

                        targetRotationY -= dx * 4.5;
                        targetRotationX = Math.max(-1.2, Math.min(1.2, targetRotationX + dy * 3.5));
                    }
                    window.lastPinchPos = { x: handPos.x, y: handPos.y };
                } else {
                    window.lastPinchPos = null;
                }

                // Smooth interpolation for camera rotations
                camera.rotation.order = 'YXZ';
                camera.rotation.y += (targetRotationY - camera.rotation.y) * 12 * delta;
                camera.rotation.x += (targetRotationX - camera.rotation.x) * 12 * delta;
                camera.rotation.z = 0; // prevent rolling
            } else {
                controls.update();
            }

            renderer.render(scene, camera);
        }

        // Initialize UI panels
        function initUI() {
            renderCategories();
            renderThumbnails();

            // Control panel collapse click
            panelCollapseBtn.addEventListener('click', () => {
                menuOpen = !menuOpen;
                if (menuOpen) {
                    controlPanel.classList.remove('-translate-x-[calc(100%+8px)]');
                    collapseIcon.innerText = 'chevron_left';
                } else {
                    controlPanel.classList.add('-translate-x-[calc(100%+8px)]');
                    collapseIcon.innerText = 'chevron_right';
                }
            });

            // Webcam toggle click
            webcamToggleBtn.addEventListener('click', () => {
                if (handTrackingActive) {
                    stopHandTracking();
                } else {
                    startHandTracking();
                }
            });

            // Initialize Parent Sync Observer
            initParentSync();
        }

        function initParentSync() {
            // Message listener for parent page control coordination
            window.addEventListener('message', (event) => {
                if (event.data) {
                    if (event.data.action === 'toggleWebcam') {
                        if (handTrackingActive) {
                            stopHandTracking();
                        } else {
                            startHandTracking();
                        }
                    } else if (event.data.action === 'stopWebcam') {
                        if (handTrackingActive) {
                            stopHandTracking();
                        }
                    } else if (event.data.action === 'setLanguage') {
                        currentLang = event.data.lang;
                        updateIframeLanguage();
                    }
                }
            });

            // Send initial state to parent
            window.parent.postMessage({
                type: 'instructionChange',
                text: instructionText.innerText
            }, '*');

            window.parent.postMessage({
                type: 'webcamBtnChange',
                text: webcamBtnText.innerText,
                active: handTrackingActive
            }, '*');

            // Sync state to parent page when changed
            const instructionObserver = new MutationObserver(() => {
                window.parent.postMessage({
                    type: 'instructionChange',
                    text: instructionText.innerText
                }, '*');
            });
            instructionObserver.observe(instructionText, { childList: true, characterData: true, subtree: true });

            const btnObserver = new MutationObserver(() => {
                window.parent.postMessage({
                    type: 'webcamBtnChange',
                    text: webcamBtnText.innerText,
                    active: handTrackingActive
                }, '*');
            });
            btnObserver.observe(webcamBtnText, { childList: true, characterData: true, subtree: true });
        }

        function renderCategories() {
            const container = document.getElementById('categories-container');
            if (!container) return;
            container.innerHTML = '';

            projectConfig.categories.forEach(cat => {
                const btn = document.createElement('button');
                const isActive = cat === currentCategory;
                btn.className = `cat-btn w-full py-3 text-[10px] md:text-[11px] font-mono tracking-widest border rounded-none text-center cursor-pointer transition-all duration-300 ${isActive
                        ? 'border-white bg-white text-black font-bold'
                        : 'border-white/15 bg-white/5 text-white/70 hover:border-white/40 hover:text-white hover:bg-white/10'
                    }`;
                btn.setAttribute('data-cat', cat);
                btn.innerText = translate(cat).toUpperCase();

                btn.addEventListener('click', () => {
                    currentCategory = cat;
                    document.querySelectorAll('.cat-btn').forEach(b => {
                        const bCat = b.getAttribute('data-cat');
                        if (bCat === currentCategory) {
                            b.className = 'cat-btn w-full py-3 text-[10px] md:text-[11px] font-mono tracking-widest border border-white rounded-none bg-white text-black font-bold cursor-pointer';
                        } else {
                            b.className = 'cat-btn w-full py-3 text-[10px] md:text-[11px] font-mono tracking-widest border border-white/15 rounded-none bg-white/5 text-white/70 hover:border-white/40 hover:text-white hover:bg-white/10 transition-all duration-300 text-center cursor-pointer';
                        }
                    });

                    renderThumbnails();
                    const firstEnv = projectConfig.variants[currentCategory][0];
                    currentTextureUrl = firstEnv.sphere;
                    loadPanorama(currentTextureUrl);
                });

                container.appendChild(btn);
            });
        }

        function renderThumbnails() {
            envContainer.innerHTML = '';
            const items = projectConfig.variants[currentCategory] || [];
            items.forEach(item => {
                const button = document.createElement('button');
                button.className = `group relative cursor-pointer flex-shrink-0 bg-transparent border-0 p-0`;

                const activeClass = currentTextureUrl === item.sphere
                    ? 'border-white shadow-[0_0_20px_rgba(255,255,255,0.25)]'
                    : 'border-white/15 grayscale hover:grayscale-0 hover:border-white/20 bg-white/5';

                button.innerHTML = `
                    <div class="w-16 h-16 md:w-18 md:h-18 p-0.5 rounded-none border-2 transition-all duration-500 overflow-hidden ${activeClass}">
                        <img src="${item.btn}" alt="${item.label}" class="w-full h-full object-cover rounded-none" />
                    </div>
                    <div class="mt-1 text-[8px] md:text-[9px] font-mono text-center tracking-widest opacity-55 group-hover:opacity-100 transition-opacity text-white font-semibold">
                        ${item.label}
                    </div>
                `;

                button.addEventListener('click', () => {
                    currentTextureUrl = item.sphere;
                    loadPanorama(currentTextureUrl);
                    renderThumbnails(); // Rerender to update active class
                });

                envContainer.appendChild(button);
            });
        }

        // Hand tracking logic
        async function startHandTracking() {
            handTrackingActive = true;
            webcamToggleBtn.classList.add('bg-white', 'text-black', 'border-white', 'shadow-[0_0_30px_rgba(255,255,255,0.25)]');
            webcamToggleBtn.classList.remove('bg-black/80', 'text-white', 'border-white/20');
            webcamBtnText.innerText = translate('exit_experience');
            pingRing.classList.remove('hidden');

            // Show webcam loader/panel
            webcamPanel.classList.remove('hidden', 'opacity-0', 'scale-90', 'pointer-events-none');
            // Force reflow
            if (webcamPanel.offsetHeight) { }
            webcamPanel.classList.add('opacity-100', 'scale-100');
            webcamLoader.classList.remove('hidden');

            instructionText.innerText = translate('initializing');
            updateLoader(10);

            try {
                // Initialize MediaPipe vision landmarker via dynamic import
                const { HandLandmarker, FilesetResolver } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.32/vision_bundle.mjs");
                const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.32/wasm');
                updateLoader(30);

                // Download model with progress simulation
                updateLoader(55);
                const response = await fetch('https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task');
                const contentLength = +(response.headers.get('Content-Length') || 0);
                const reader = response.body?.getReader();
                if (!reader) throw new Error('Failed to read model body');

                let receivedLength = 0;
                const chunks = [];
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    if (contentLength) {
                        const progress = 30 + Math.round((receivedLength / contentLength) * 50);
                        updateLoader(progress);
                    }
                }

                const modelBuffer = new Uint8Array(receivedLength);
                let position = 0;
                for (let chunk of chunks) {
                    modelBuffer.set(chunk, position);
                    position += chunk.length;
                }

                landmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetBuffer: modelBuffer,
                        delegate: 'GPU',
                    },
                    runningMode: 'VIDEO',
                    numHands: 1,
                    minHandDetectionConfidence: 0.5,
                });

                updateLoader(90);

                // Request camera permission
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 320, height: 240, facingMode: 'user' },
                    audio: false,
                });

                webcamStream = stream;
                webcamVideo.srcObject = stream;
                await webcamVideo.play();

                updateLoader(100);

                setTimeout(() => {
                    webcamLoader.classList.add('hidden');
                    statusIndicator.className = 'w-1.5 h-1.5 rounded-full bg-white/40 animate-pulse';
                    statusLabel.className = 'text-[10px] font-mono tracking-widest uppercase text-white/70';
                    statusLabel.innerText = 'Tracking...';
                    instructionText.innerText = translate('setup_complete');

                    // Show custom cursor
                    virtualCursor.classList.remove('hidden');

                    // Synchronize initial rotation angles
                    targetRotationX = camera.rotation.x;
                    targetRotationY = camera.rotation.y;

                    // Start loop prediction
                    predictHand();
                }, 500);

            } catch (err) {
                console.error('[HandTracker] startup failed:', err);
                statusIndicator.className = 'w-1.5 h-1.5 rounded-full bg-red-500';
                statusLabel.className = 'text-[10px] font-mono tracking-widest uppercase text-red-400';
                statusLabel.innerText = 'Error';
                instructionText.innerText = translate('failed_load');
            }
        }

        function stopHandTracking() {
            handTrackingActive = false;
            webcamToggleBtn.classList.remove('bg-white', 'text-black', 'border-white', 'shadow-[0_0_30px_rgba(255,255,255,0.25)]');
            webcamToggleBtn.classList.add('bg-black/80', 'text-white', 'border-white/20');
            webcamBtnText.innerText = translate('use_webcam');
            pingRing.classList.add('hidden');

            // Hide webcam panel/cursor
            webcamPanel.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
            webcamPanel.classList.remove('opacity-100', 'scale-100');
            setTimeout(() => {
                if (!handTrackingActive && webcamPanel) webcamPanel.classList.add('hidden');
            }, 500);
            virtualCursor.classList.add('hidden');

            instructionText.innerText = translate('drag_rotate');

            // Clean resources
            if (rafId) cancelAnimationFrame(rafId);
            if (webcamStream) {
                webcamStream.getTracks().forEach(t => t.stop());
                webcamStream = null;
            }
            if (landmarker) {
                landmarker.close();
                landmarker = null;
            }
            handPos = null;
        }

        function updateLoader(pct) {
            loaderPercentage.innerText = `${pct}%`;
            loaderCircle.style.strokeDashoffset = 138 * (1 - pct / 100);
        }

        let lastVideoTime = -1;
        function predictHand() {
            if (!handTrackingActive || !landmarker || !webcamVideo) return;

            if (webcamVideo.currentTime !== lastVideoTime && webcamVideo.readyState >= 2) {
                lastVideoTime = webcamVideo.currentTime;
                const results = landmarker.detectForVideo(webcamVideo, performance.now());

                if (results.landmarks && results.landmarks.length > 0) {
                    const lm = results.landmarks[0][9]; // Palm middle joint
                    const indexTip = results.landmarks[0][8];
                    const thumbTip = results.landmarks[0][4];

                    const dist = Math.sqrt(Math.pow(indexTip.x - thumbTip.x, 2) + Math.pow(indexTip.y - thumbTip.y, 2));
                    const isPinching = dist < 0.05;

                    // Central 60% of camera maps to screen
                    const MARGIN = 0.2;
                    const range = 1 - 2 * MARGIN;
                    const rawX = Math.max(0, Math.min(1, ((1 - lm.x) - MARGIN) / range));
                    const rawY = Math.max(0, Math.min(1, (lm.y - MARGIN) / range));

                    const x = rawX * 2 - 1;
                    const y = -(rawY * 2 - 1);

                    handPos = { x, y, isPinching };
                    handDetected = true;
                    statusIndicator.className = 'w-1.5 h-1.5 rounded-full bg-white animate-pulse';
                    statusLabel.className = 'text-[10px] font-mono tracking-widest uppercase text-white';
                    statusLabel.innerText = 'Hand Detected';

                    instructionText.innerText = translate('pinch_rotate');

                    // Update cursor rendering
                    updateCursor(x, y, isPinching);

                    // Handle dwell click if not pinching
                    if (!isPinching) {
                        handleDwellClick(x, y);
                    } else {
                        // Reset hover element if pinching
                        cursorProgress.classList.add('hidden');
                        hoverElement = null;
                    }
                } else {
                    handDetected = false;
                    statusIndicator.className = 'w-1.5 h-1.5 rounded-full bg-white/20';
                    statusLabel.className = 'text-[10px] font-mono tracking-widest uppercase text-white/40';
                    statusLabel.innerText = 'Tracking...';
                    instructionText.innerText = translate('show_hand');

                    cursorRing.className = 'w-full h-full rounded-full border-2 border-white/20';
                    cursorProgress.classList.add('hidden');
                    hoverElement = null;
                }
            }

            rafId = requestAnimationFrame(predictHand);
        }

        function updateCursor(x, y, isPinching) {
            const screenX = (x + 1) / 2 * window.innerWidth;
            const screenY = (1 - (y + 1) / 2) * window.innerHeight;

            virtualCursor.style.left = `${screenX - 16}px`;
            virtualCursor.style.top = `${screenY - 16}px`;

            if (isPinching) {
                virtualCursor.style.transform = `scale(0.8)`;
                cursorRing.className = 'w-full h-full rounded-full border-2 border-white bg-white/20';
            } else {
                virtualCursor.style.transform = `scale(1)`;
                cursorRing.className = 'w-full h-full rounded-full border-2 border-white/50';
            }
        }

        function handleDwellClick(x, y) {
            const screenX = (x + 1) / 2 * window.innerWidth;
            const screenY = (1 - (y + 1) / 2) * window.innerHeight;

            let element = document.elementFromPoint(screenX, screenY);

            // Check if the hand cursor overlaps parent's fullscreen/exit-fullscreen buttons
            try {
                if (window.parent && window.parent !== window && window.frameElement) {
                    const iframeRect = window.frameElement.getBoundingClientRect();
                    const parentX = iframeRect.left + screenX;
                    const parentY = iframeRect.top + screenY;
                    const parentElement = window.parent.document.elementFromPoint(parentX, parentY);

                    if (parentElement && (
                        parentElement.classList.contains('fullscreen-btn') ||
                        parentElement.closest('.fullscreen-btn') ||
                        parentElement.classList.contains('exit-fullscreen-btn') ||
                        parentElement.closest('.exit-fullscreen-btn')
                    )) {
                        element = parentElement.closest('.fullscreen-btn') || parentElement.closest('.exit-fullscreen-btn');
                    }
                }
            } catch (err) {
                console.warn("Could not check parent document for element:", err);
            }

            if (element && (element.tagName === 'BUTTON' || element.closest('button') || element.closest('.group'))) {
                const target = (element.closest('button') || element.closest('.group'));

                if (target !== hoverElement) {
                    hoverElement = target;
                    hoverStartTime = Date.now();
                    cursorProgress.classList.remove('hidden');
                } else {
                    const elapsed = Date.now() - hoverStartTime;

                    if (elapsed > 600) {
                        if (Date.now() - lastClickTime > 1000) {
                            target.click();
                            lastClickTime = Date.now();
                            hoverElement = null;
                            cursorProgress.classList.add('hidden');
                        }
                    }
                }
            } else {
                hoverElement = null;
                cursorProgress.classList.add('hidden');
            }
        }

        // Initialize App
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', () => {
                initThree();
                initUI();
            });
        } else {
            initThree();
            initUI();
        }
    </script>
