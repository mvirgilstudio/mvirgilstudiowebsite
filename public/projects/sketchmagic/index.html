    <script>
        // Comprehensive translation map for SketchMagic
        const translations = {
            pt: {
                // Navbar
                "nav.expertise": "ESPECIALIDADE",
                "nav.about": "SOBRE",
                "nav.contact": "CONTACTO",
                "nav.menu": "Menu",
                "nav.close": "Fechar",
                // Hero
                "Unleash Imagination!": "Liberta a Imaginação!",
                "DRAW WITH YOUR HANDS!": "DESENHA COM AS TUAS MÃOS!",
                "Wave your hands to create magical sketches and watch them transform into playful AI images in real time!": "Acena com as mãos para criares esboços mágicos e vê-os transformarem-se em imagens de IA divertidas em tempo real!",
                "START MAGIC!": "COMEÇAR MAGIA!",
                "RE_MIXING...": "A REMISTURAR...",

                "#MAGIC_WAND": "#VARINHA_MÁGICA",

                "#CREATIVE": "#CRIATIVO",
                // How to Play
                "HOW TO PLAY": "COMO JOGAR",
                "WAVE & DRAW": "ACENA E DESENHA",
                "Wave your hands in the air to draw on the screen. The more creative, the better!": "Acena com as mãos no ar para desenhares no ecrã. Quanto mais criativo, melhor!",
                "PICK A THEME": "ESCOLHE UM TEMA",
                "Choose your theme: Cute Cartoon Monsters, Rainbow Stars, or Abstract Landscapes.": "Escolhe o teu tema: Monstros Coloridos, Estrelas Arco-íris ou Paisagens Abstratas.",
                "WATCH IT GLOW": "VÊ O BRILHO",
                "Watch projections display your results in real time! Share your magical art with everyone.": "Vê as projeções mostrarem os teus resultados em tempo real! Partilha a tua arte mágica com todos.",
                // Features
                "REAL-TIME": "TEMPO REAL",
                "INSTANT PROJECTIONS": "PROJEÇÕES INSTANTÂNEAS",
                "Sensors instantly capture your every gesture, projecting your playful AI-generated art onto screens in real time.": "Sensores captam instantaneamente cada gesto teu, projetando a tua arte gerada por IA nos ecrãs em tempo real.",
                "SUPER FAST": "SUPER RÁPIDO",
                "As you move, the magic follows. See your art transform instantly on the big screen.": "À medida que te moves, a magia acompanha-te. Vê a tua arte transformar-se instantaneamente no ecrã gigante.",
                "100% FUN": "100% DIVERSÃO",
                "CUTE MONSTERS": "MONSTROS FOFOS",
                "Create friendly, colorful cartoon monsters that react to your movements.": "Cria monstros de animação amigáveis e coloridos que reagem aos teus movimentos.",
                "RAINBOW STARS": "ESTRELAS ARCO-ÍRIS",
                "Fill the screen with magical, glowing rainbow stars and bright colors.": "Enche o ecrã com estrelas arco-íris mágicas e brilhantes.",
                "DREAM LANDSCAPES": "PAISAGENS DE SONHO",
                "Build beautiful, abstract landscapes based on your pure imagination.": "Constrói paisagens abstratas e bonitas baseadas na tua pura imaginação.",
                // Footer
                "DIREITOS RESERVADOS": "TODOS OS DIREITOS RESERVADOS",
                "SOLUÇÕES EM TECNOLOGIA DE MISTURA DE REALIDADES": "SOLUÇÕES TECNOLÓGICAS DE REALIDADE MISTA"
            },
            en: {
                "nav.expertise": "EXPERTISE",
                "nav.about": "ABOUT",
                "nav.contact": "CONTACT",
                "nav.menu": "Menu",
                "nav.close": "Close",
                "Unleash Imagination!": "Unleash Imagination!",
                "DRAW WITH YOUR HANDS!": "DRAW WITH YOUR HANDS!",
                "Wave your hands to create magical sketches and watch them transform into playful AI images in real time!": "Wave your hands to create magical sketches and watch them transform into playful AI images in real time!",
                "START MAGIC!": "START MAGIC!",
                "RE_MIXING...": "RE_MIXING...",
                "FUN & INTERACTIVE MAGIC": "FUN & INTERACTIVE MAGIC",
                "An immersive experience combining creativity and technology. Sensors capture your movements and transform them into art instantly!": "An immersive experience combining creativity and technology. Sensors capture your movements and transform them into art instantly!",
                "#MAGIC_WAND": "#MAGIC_WAND",
                "#SUPER_FUN": "#SUPER_FUN",
                "#CREATIVE": "#CREATIVE",
                "HOW TO PLAY": "HOW TO PLAY",
                "WAVE & DRAW": "WAVE & DRAW",
                "Wave your hands in the air to draw on the screen. The more creative, the better!": "Wave your hands in the air to draw on the screen. The more creative, the better!",
                "PICK A THEME": "PICK A THEME",
                "Choose your theme: Cute Cartoon Monsters, Rainbow Stars, or Abstract Landscapes.": "Choose your theme: Cute Cartoon Monsters, Rainbow Stars, or Abstract Landscapes.",
                "WATCH IT GLOW": "WATCH IT GLOW",
                "Watch projections display your results in real time! Share your magical art with everyone.": "Watch projections display your results in real time! Share your magical art with everyone.",
                "REAL-TIME": "REAL-TIME",
                "INSTANT PROJECTIONS": "INSTANT PROJECTIONS",
                "Sensors instantly capture your every gesture, projecting your playful AI-generated art onto screens in real time.": "Sensors instantly capture your every gesture, projecting your playful AI-generated art onto screens in real time.",
                "SUPER FAST": "SUPER FAST",
                "As you move, the magic follows. See your art transform instantly on the big screen.": "As you move, the magic follows. See your art transform instantly on the big screen.",
                "100% FUN": "100% FUN",
                "CUTE MONSTERS": "CUTE MONSTERS",
                "Create friendly, colorful cartoon monsters that react to your movements.": "Create friendly, colorful cartoon monsters that react to your movements.",
                "RAINBOW STARS": "RAINBOW STARS",
                "Fill the screen with magical, glowing rainbow stars and bright colors.": "Fill the screen with magical, glowing rainbow stars and bright colors.",
                "DREAM LANDSCAPES": "DREAM LANDSCAPES",
                "Build beautiful, abstract landscapes based on your pure imagination.": "Build beautiful, abstract landscapes based on your pure imagination.",
                "DIREITOS RESERVADOS": "ALL RIGHTS RESERVED",
                "SOLUÇÕES EM TECNOLOGIA DE MISTURA DE REALIDADES": "MIXED REALITY TECHNOLOGY SOLUTIONS"
            }
        };

        let currentLang = 'pt';

        function translateNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                const text = node.textContent.trim();
                if (!text) return;

                for (const key in translations.en) {
                    if (translations.en[key] === text && currentLang === 'pt') {
                        node.textContent = node.textContent.replace(translations.en[key], translations.pt[key]);
                        return;
                    }
                }
                for (const key in translations.pt) {
                    if (translations.pt[key] === text && currentLang === 'en') {
                        node.textContent = node.textContent.replace(translations.pt[key], translations.en[key]);
                        return;
                    }
                }
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                if (node.id === 'main-header' || node.id === 'mobile-menu') return;

                // Handle complex titles with nested tags/br
                if (node.tagName === 'H1' || node.tagName === 'H2') {
                    const fullText = node.innerText.replace(/\s+/g, ' ').trim().toUpperCase();
                    const isHero = fullText.includes("DRAW WITH YOUR HANDS") || fullText.includes("DESENHA COM AS TUAS MÃOS");
                    const isConcept = fullText.includes("FUN & INTERACTIVE MAGIC") || fullText.includes("MAGIA DIVERTIDA E INTERATIVA");

                    if (isHero) {
                        if (currentLang === 'pt') {
                            node.innerHTML = 'DESENHA COM <br /> AS TUAS <span class="text-secondary">MÃOS!</span>';
                        } else {
                            node.innerHTML = 'DRAW WITH <br /> YOUR <span class="text-secondary">HANDS!</span>';
                        }
                        return;
                    }
                    if (isConcept) {
                        if (currentLang === 'pt') {
                            node.innerHTML = 'MAGIA DIVERTIDA E <br/><span class="text-white drop-shadow-[4px_4px_0px_#000]">INTERATIVA</span>';
                        } else {
                            node.innerHTML = 'FUN & INTERACTIVE <br/><span class="text-white drop-shadow-[4px_4px_0px_#000]">MAGIC</span>';
                        }
                        return;
                    }
                }

                node.childNodes.forEach(translateNode);
            }
        }

        function updateLanguage() {
            // 1. Update static elements with data-t
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });

            // 2. Update dynamic content inside #root
            const root = document.getElementById('root');
            if (root) translateNode(root);

            // 3. Update toggle buttons UI
            const toggle = document.getElementById('lang-toggle');
            if (toggle) toggle.textContent = currentLang.toUpperCase();

            const ptMobile = document.getElementById('lang-pt-mobile');
            const enMobile = document.getElementById('lang-en-mobile');

            if (ptMobile && enMobile) {
                if (currentLang === 'pt') {
                    ptMobile.classList.add('text-white');
                    ptMobile.classList.remove('opacity-40');
                    enMobile.classList.remove('text-white');
                    enMobile.classList.add('opacity-40');
                } else {
                    enMobile.classList.add('text-white');
                    enMobile.classList.remove('opacity-40');
                    ptMobile.classList.remove('text-white');
                    ptMobile.classList.add('opacity-40');
                }
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            updateLanguage();
        }

        // MutationObserver to handle React re-renders
        const observer = new MutationObserver((mutations) => {
            if (currentLang === 'pt') { // Only auto-translate to PT if that's the current selection
                mutations.forEach(mutation => {
                    mutation.addedNodes.forEach(node => translateNode(node));
                });
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateLanguage();
            const root = document.getElementById('root');
            if (root) {
                observer.observe(root, { childList: true, subtree: true });
            }
        });
    </script>
