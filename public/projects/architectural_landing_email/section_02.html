<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ARC.TECH | Interactive 360 Experience</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600&amp;family=Orbitron:wght@500;700&amp;family=Oswald:wght@500&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Hanken Grotesk", "sans-serif"],
                        orbitron: ["Orbitron", "sans-serif"],
                        mono: ["Courier New", "Courier", "monospace"]
                    }
                }
            }
        };
    </script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #040404;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        button, a {
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 3D camera tracker styles */
        video {
            transform: scaleX(-1);
        }
    </style>
</head>

<body class="font-sans antialiased selection:bg-white selection:text-black">
    <div class="relative w-full h-full overflow-hidden">
        <!-- Canvas Viewport -->
        <div id="canvas-container" class="absolute inset-0 z-10"></div>

        <!-- Virtual Cursor -->
        <div id="virtual-cursor" class="fixed w-8 h-8 pointer-events-none z-[9999] flex items-center justify-center hidden">
            <div id="cursor-ring" class="w-full h-full rounded-full border-2 border-white/50 transition-colors duration-300"></div>
            <div id="cursor-progress" class="absolute inset-[-4px] rounded-full border-2 border-[#5282be] border-t-transparent animate-spin hidden"></div>
        </div>

        <!-- Webcam Feed Overlay Panel (Bottom Right) -->
        <div id="webcam-panel" class="fixed bottom-4 md:bottom-8 right-4 md:right-8 w-40 md:w-64 h-32 md:h-48 overflow-hidden rounded-2xl border border-white/10 bg-black/80 backdrop-blur-md opacity-0 scale-90 pointer-events-none transition-all duration-500 shadow-2xl z-[50]">
            <video id="webcam-video" class="w-full h-full object-cover opacity-80" playsinline muted></video>
            <div class="absolute top-0 left-0 right-0 flex items-center gap-2 px-3 py-2 bg-black/50 backdrop-blur-sm">
                <div id="status-indicator" class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
                <span id="status-label" class="text-[10px] font-mono tracking-widest uppercase text-white/40">Tracking...</span>
            </div>
            <!-- Loading circle indicator -->
            <div id="webcam-loader" class="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-black/85 backdrop-blur-md hidden">
                <div class="relative w-12 h-12 flex items-center justify-center">
                    <svg class="w-full h-full -rotate-90">
                        <circle cx="24" cy="24" r="22" fill="none" stroke="white" stroke-width="1.5" class="opacity-10" />
                        <circle id="loader-circle" cx="24" cy="24" r="22" fill="none" stroke="#5282be" stroke-width="2.5"
                            stroke-dasharray="138" stroke-dashoffset="138" class="transition-all duration-150" />
                    </svg>
                    <span id="loader-percentage" class="absolute text-[9px] font-mono font-bold text-[#5282be]">0%</span>
                </div>
                <span class="text-[9px] font-mono text-white/60 uppercase tracking-widest animate-pulse">Downloading Model</span>
            </div>
            <div class="absolute bottom-0 left-0 right-0 flex justify-between items-center px-3 py-1.5 bg-black/50 backdrop-blur-sm">
                <span class="text-[9px] font-mono text-white/20 uppercase tracking-widest">AI VISION ENGINE</span>
                <span class="text-[9px] font-mono text-white/20 uppercase tracking-widest">Palm Tracking</span>
            </div>
        </div>

        <!-- Hand-Tracking Control Bar (Bottom Center) -->
        <div id="hand-tracking-controls" class="absolute bottom-6 md:bottom-12 left-1/2 -translate-x-1/2 z-[40] pointer-events-auto flex flex-col items-center gap-3 md:gap-6 w-full max-w-2xl px-4">
            <!-- Instruction Toast -->
            <div id="instruction-toast" class="flex justify-center w-full transition-all duration-500">
                <div class="bg-white/5 backdrop-blur-2xl border border-white/10 px-4 md:px-8 py-2 md:py-4 rounded-full flex items-center justify-center gap-2 md:gap-5 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                    <div class="w-1.5 h-1.5 rounded-full bg-white/40 animate-pulse flex-shrink-0"></div>
                    <span id="instruction-text" class="text-[10px] md:text-xs font-sans tracking-[0.2em] md:tracking-[0.3em] uppercase text-white font-bold text-center">
                        DRAG TO ROTATE SCENE
                    </span>
                </div>
            </div>

            <!-- webcam toggle button -->
            <button id="webcam-toggle-btn" class="group relative flex items-center gap-2 md:gap-3 px-4 md:px-6 py-2.5 md:py-3 rounded-full border border-[#5282be]/40 bg-black/80 hover:border-white/30 hover:bg-white/5 backdrop-blur-md transition-all duration-500 cursor-pointer hidden">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5 flex-shrink-0 text-[#5282be] group-hover:text-white transition-colors duration-300">
                    <path d="M18 11V6a2 2 0 0 0-4 0v5" /><path d="M14 10V4a2 2 0 0 0-4 0v6" /><path d="M10 10.5V6a2 2 0 0 0-4 0v8" /><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15" />
                </svg>
                <span id="webcam-btn-text" class="text-[9px] md:text-xs uppercase font-mono tracking-[0.1em] md:tracking-[0.2em] text-[#5282be] group-hover:text-white transition-colors duration-300">
                    use your webcam and play with hands
                </span>
                <span id="ping-ring" class="absolute inset-0 rounded-full border border-[#5282be]/40 animate-ping hidden"></span>
            </button>
        </div>

        <!-- Sidebar Toggle Menu (Left) -->
        <div class="fixed left-4 md:left-8 top-1/2 -translate-y-1/2 z-[40] pointer-events-auto">
            <button id="menu-toggle-btn" class="group relative w-[88px] h-[88px] md:w-24 md:h-24 rounded-2xl border-2 border-white/20 bg-black/60 hover:border-white/50 hover:bg-white/10 backdrop-blur-xl transition-all duration-500 shadow-[0_0_30px_rgba(0,0,0,0.5)] cursor-pointer">
                <div class="relative w-6 h-6 mx-auto flex items-center justify-center">
                    <div id="burger-top" class="absolute w-5 h-0.5 rounded-full bg-white/70 transition-all duration-300 -translate-y-1"></div>
                    <div id="burger-mid" class="absolute w-5 h-0.5 rounded-full bg-white/70 transition-all duration-300"></div>
                    <div id="burger-bottom" class="absolute w-5 h-0.5 rounded-full bg-white/70 transition-all duration-300 translate-y-1"></div>
                </div>
                <span class="absolute inset-0 rounded-2xl border border-white/20 animate-pulse-slow"></span>
            </button>
            <span class="block text-[8px] md:text-[9px] font-mono tracking-[0.3em] uppercase text-white/50 text-center mt-2 pointer-events-none">
                Menu
            </span>
        </div>

        <!-- Collapsible Menu Panel -->
        <div id="menu-panel" class="fixed left-[120px] md:left-[144px] top-1/2 -translate-y-1/2 z-[40] opacity-0 -translate-x-6 scale-95 pointer-events-none transition-all duration-500 ease-out">
            <div class="bg-black/85 backdrop-blur-2xl border border-white/10 rounded-3xl p-5 md:p-7 shadow-[0_0_80px_rgba(0,0,0,0.8)] flex flex-col gap-6 md:gap-8 max-h-[70vh] overflow-y-auto no-scrollbar w-64 md:w-80">
                <!-- Categories -->
                <div class="flex flex-col gap-3 md:gap-4">
                    <div class="flex items-center gap-3 mb-1">
                        <div class="w-6 h-[1px] bg-[#5282be]/50"></div>
                        <span class="text-[10px] md:text-[11px] font-mono tracking-[0.4em] text-[#5282be]/80 uppercase font-bold">Category</span>
                    </div>
                    <div class="flex flex-col gap-2 md:gap-3">
                        <button class="cat-btn w-full px-5 md:px-7 py-3.5 md:py-4 text-[11px] md:text-[13px] font-mono tracking-[0.3em] border border-white/10 rounded-xl bg-white/5 text-white/70 hover:border-white/40 hover:text-white hover:bg-white/10 transition-all duration-300 text-left cursor-pointer active font-bold" data-cat="bedroom">
                            BEDROOM
                        </button>
                        <button class="cat-btn w-full px-5 md:px-7 py-3.5 md:py-4 text-[11px] md:text-[13px] font-mono tracking-[0.3em] border border-white/10 rounded-xl bg-white/5 text-white/70 hover:border-white/40 hover:text-white hover:bg-white/10 transition-all duration-300 text-left cursor-pointer" data-cat="kitchen">
                            KITCHEN
                        </button>
                        <button class="cat-btn w-full px-5 md:px-7 py-3.5 md:py-4 text-[11px] md:text-[13px] font-mono tracking-[0.3em] border border-white/10 rounded-xl bg-white/5 text-white/70 hover:border-white/40 hover:text-white hover:bg-white/10 transition-all duration-300 text-left cursor-pointer" data-cat="livingroom">
                            LIVINGROOM
                        </button>
                    </div>
                </div>

                <div class="w-full h-[1px] bg-white/10"></div>

                <!-- Environments -->
                <div class="flex flex-col gap-3 md:gap-4">
                    <div class="flex items-center gap-3 mb-1">
                        <div class="w-6 h-[1px] bg-[#5282be]/50"></div>
                        <span class="text-[10px] md:text-[11px] font-mono tracking-[0.4em] text-[#5282be]/80 uppercase font-bold">Environment</span>
                    </div>
                    <div id="env-thumbnails-container" class="flex flex-row gap-3 md:gap-4 overflow-x-auto no-scrollbar">
                        <!-- Dynamic items -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- ThreeJS & OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" defer></script>
    <!-- MediaPipe Tasks Vision CDN -->
    <script type="module">

        // Constants Data mapping
        const SECTION_02_VARIANTS = {
            bedroom: [
                { id: 'b01', btn: 'assets/s_bedroom_01_bttn.png', sphere: 'assets/bedroom_01.jpg', label: 'BDRM-01' },
                { id: 'b02', btn: 'assets/s_bedroom_02_bttn.png', sphere: 'assets/bedroom_02.jpg', label: 'BDRM-02' },
                { id: 'b03', btn: 'assets/s_bedroom_03_bttn.png', sphere: 'assets/bedroom_03.jpg', label: 'BDRM-03' },
            ],
            kitchen: [
                { id: 'k01', btn: 'assets/s_kitchen_01_bttn.png', sphere: 'assets/kitchen_01.jpg', label: 'KTCH-01' },
                { id: 'k02', btn: 'assets/s_kitchen_02_bttn.png', sphere: 'assets/kitchen_02.jpg', label: 'KTCH-02' },
                { id: 'k03', btn: 'assets/s_kitchen_03_bttn.png', sphere: 'assets/kitchen_03.jpg', label: 'KTCH-03' },
            ],
            livingroom: [
                { id: 'l01', btn: 'assets/s_livingroom_01_bttn.png', sphere: 'assets/livingroom_01.jpg', label: 'LVRM-01' },
                { id: 'l02', btn: 'assets/s_livingroom_02_bttn.png', sphere: 'assets/livingroom_02.jpg', label: 'LVRM-02' },
                { id: 'l03', btn: 'assets/s_livingroom_03_bttn.png', sphere: 'assets/livingroom_03.jpg', label: 'LVRM-03' },
            ]
        };

        // State Variables
        let currentCategory = 'bedroom';
        let currentTextureUrl = SECTION_02_VARIANTS[currentCategory][0].sphere;
        let handTrackingActive = false;
        let menuOpen = false;
        let landmarker = null;
        let webcamStream = null;
        let rafId = null;

        // Visibility tracking for render loop optimization
        let isPageVisible = true;
        let isCanvasVisible = true;
        document.addEventListener('visibilitychange', () => {
            isPageVisible = document.visibilityState === 'visible';
        });

        // ThreeJS variables
        let scene, camera, renderer, controls, sphereMesh, textureLoader;

        // DOM Elements
        const canvasContainer = document.getElementById('canvas-container');
        const webcamPanel = document.getElementById('webcam-panel');
        const webcamVideo = document.getElementById('webcam-video');
        const webcamLoader = document.getElementById('webcam-loader');
        const loaderCircle = document.getElementById('loader-circle');
        const loaderPercentage = document.getElementById('loader-percentage');
        const statusIndicator = document.getElementById('status-indicator');
        const statusLabel = document.getElementById('status-label');
        const webcamToggleBtn = document.getElementById('webcam-toggle-btn');
        const webcamBtnText = document.getElementById('webcam-btn-text');
        const pingRing = document.getElementById('ping-ring');
        const instructionToast = document.getElementById('instruction-toast');
        const instructionText = document.getElementById('instruction-text');
        const menuToggleBtn = document.getElementById('menu-toggle-btn');
        const menuPanel = document.getElementById('menu-panel');
        const burgerTop = document.getElementById('burger-top');
        const burgerMid = document.getElementById('burger-mid');
        const burgerBottom = document.getElementById('burger-bottom');
        const envContainer = document.getElementById('env-thumbnails-container');
        const virtualCursor = document.getElementById('virtual-cursor');
        const cursorRing = document.getElementById('cursor-ring');
        const cursorProgress = document.getElementById('cursor-progress');

        // Track hand position state
        let handPos = null; // { x, y, isPinching }
        let handDetected = false;

        // Dwell click properties
        let hoverElement = null;
        let hoverStartTime = 0;
        let lastClickTime = 0;

        // Initialize Three.js
        function initThree() {
            scene = new THREE.Scene();

            // Camera centered inside the sphere
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0.1);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            canvasContainer.appendChild(renderer.domElement);

            // Observe visibility of the canvas to throttle rendering when off-screen
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        isCanvasVisible = entry.isIntersecting;
                    });
                }, { threshold: 0.1 });
                observer.observe(renderer.domElement);
            }

            // Orbit controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = false;
            controls.enablePan = false;
            controls.rotateSpeed = -0.4;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            // Load initial texture and create sphere mesh
            textureLoader = new THREE.TextureLoader();
            loadPanorama(currentTextureUrl);

            // Resize listener
            window.addEventListener('resize', onWindowResize);

            // Start loop
            animate();
        }

        function loadPanorama(url) {
            textureLoader.load(
                url,
                (texture) => {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    texture.colorSpace = THREE.SRGBColorSpace;

                    if (sphereMesh) {
                        sphereMesh.material.map = texture;
                        sphereMesh.material.needsUpdate = true;
                    } else {
                        const geometry = new THREE.SphereGeometry(500, 64, 64);
                        // Invert geometry so faces point inward
                        geometry.scale(-1, 1, 1);
                        const material = new THREE.MeshBasicMaterial({ map: texture });
                        sphereMesh = new THREE.Mesh(geometry, material);
                        scene.add(sphereMesh);
                    }
                },
                undefined,
                (err) => {
                    console.error('[ThreeJS] Failed to load panorama texture:', url, err);
                }
            );
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let clock = new THREE.Clock();
        let targetRotationY = 0;
        let targetRotationX = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Skip rendering if page is in background or canvas is offscreen
            if (!isPageVisible || !isCanvasVisible) return;

            const delta = clock.getDelta();

            if (handTrackingActive && handPos) {
                // If hand tracking is active, rotate camera based on pinch mapping
                if (handPos.isPinching) {
                    if (window.lastPinchPos) {
                        const dx = handPos.x - window.lastPinchPos.x;
                        const dy = handPos.y - window.lastPinchPos.y;

                        targetRotationY -= dx * 4.5;
                        targetRotationX = Math.max(-1.2, Math.min(1.2, targetRotationX + dy * 3.5));
                    }
                    window.lastPinchPos = { x: handPos.x, y: handPos.y };
                } else {
                    window.lastPinchPos = null;
                }

                // Smooth interpolation for camera rotations
                camera.rotation.order = 'YXZ';
                camera.rotation.y += (targetRotationY - camera.rotation.y) * 12 * delta;
                camera.rotation.x += (targetRotationX - camera.rotation.x) * 12 * delta;
                camera.rotation.z = 0; // prevent rolling
            } else {
                controls.update();
            }

            renderer.render(scene, camera);
        }

        // Initialize UI panels
        function initUI() {
            renderThumbnails();

            // Set up category button clicks
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const cat = e.currentTarget.getAttribute('data-cat');
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active', 'font-bold'));
                    e.currentTarget.classList.add('active', 'font-bold');
                    currentCategory = cat;
                    renderThumbnails();
                    // Load first env of new category
                    const firstEnv = SECTION_02_VARIANTS[currentCategory][0];
                    currentTextureUrl = firstEnv.sphere;
                    loadPanorama(currentTextureUrl);
                });
            });

            // Menu toggle click
            menuToggleBtn.addEventListener('click', () => {
                menuOpen = !menuOpen;
                if (menuOpen) {
                    menuPanel.classList.remove('opacity-0', '-translate-x-6', 'scale-95', 'pointer-events-none');
                    menuPanel.classList.add('opacity-100', 'translate-x-0', 'scale-100', 'pointer-events-auto');
                    menuToggleBtn.classList.add('bg-white/15', 'border-[#5282be]/80', 'shadow-[0_0_40px_rgba(82,130,190,0.35)]');
                    burgerTop.classList.add('rotate-45', 'bg-[#5282be]');
                    burgerTop.classList.remove('-translate-y-1', 'bg-white/70');
                    burgerMid.classList.add('opacity-0', 'scale-x-0');
                    burgerBottom.classList.add('-rotate-45', 'bg-[#5282be]');
                    burgerBottom.classList.remove('translate-y-1', 'bg-white/70');
                } else {
                    menuPanel.classList.add('opacity-0', '-translate-x-6', 'scale-95', 'pointer-events-none');
                    menuPanel.classList.remove('opacity-100', 'translate-x-0', 'scale-100', 'pointer-events-auto');
                    menuToggleBtn.classList.remove('bg-white/15', 'border-[#5282be]/80', 'shadow-[0_0_40px_rgba(82,130,190,0.35)]');
                    burgerTop.classList.remove('rotate-45', 'bg-[#5282be]');
                    burgerTop.classList.add('-translate-y-1', 'bg-white/70');
                    burgerMid.classList.remove('opacity-0', 'scale-x-0');
                    burgerBottom.classList.remove('-rotate-45', 'bg-[#5282be]');
                    burgerBottom.classList.add('translate-y-1', 'bg-white/70');
                }
            });

            // Webcam toggle click
            webcamToggleBtn.addEventListener('click', () => {
                if (handTrackingActive) {
                    stopHandTracking();
                } else {
                    startHandTracking();
                }
            });

            // Initialize Parent Sync Observer
            initParentSync();
        }

        function initParentSync() {
            // Message listener for parent page control coordination
            window.addEventListener('message', (event) => {
                if (event.data && event.data.action === 'toggleWebcam') {
                    if (handTrackingActive) {
                        stopHandTracking();
                    } else {
                        startHandTracking();
                    }
                }
            });

            // Send initial state to parent
            window.parent.postMessage({
                type: 'instructionChange',
                text: instructionText.innerText
            }, '*');

            window.parent.postMessage({
                type: 'webcamBtnChange',
                text: webcamBtnText.innerText,
                active: handTrackingActive
            }, '*');

            // Sync state to parent page when changed
            const instructionObserver = new MutationObserver(() => {
                window.parent.postMessage({
                    type: 'instructionChange',
                    text: instructionText.innerText
                }, '*');
            });
            instructionObserver.observe(instructionText, { childList: true, characterData: true, subtree: true });

            const btnObserver = new MutationObserver(() => {
                window.parent.postMessage({
                    type: 'webcamBtnChange',
                    text: webcamBtnText.innerText,
                    active: handTrackingActive
                }, '*');
            });
            btnObserver.observe(webcamBtnText, { childList: true, characterData: true, subtree: true });
        }

        function renderThumbnails() {
            envContainer.innerHTML = '';
            const items = SECTION_02_VARIANTS[currentCategory];
            items.forEach(item => {
                const button = document.createElement('button');
                button.className = `group relative cursor-pointer flex-shrink-0 bg-transparent border-0 p-0`;

                const activeClass = currentTextureUrl === item.sphere 
                    ? 'border-[#5282be] shadow-[0_0_30px_rgba(82,130,190,0.35)]'
                    : 'border-white/10 grayscale hover:grayscale-0 hover:border-white/30 bg-white/5';

                button.innerHTML = `
                    <div class="w-20 h-20 md:w-24 md:h-24 p-0.5 rounded-xl md:rounded-2xl border-2 transition-all duration-500 overflow-hidden ${activeClass}">
                        <img src="${item.btn}" alt="${item.label}" loading="lazy" class="w-full h-full object-cover rounded-lg md:rounded-xl" />
                    </div>
                    <div class="mt-2 text-[9px] md:text-[11px] font-mono text-center tracking-[0.2em] opacity-50 group-hover:opacity-100 transition-opacity text-white font-bold">
                        ${item.label}
                    </div>
                `;

                button.addEventListener('click', () => {
                    currentTextureUrl = item.sphere;
                    loadPanorama(currentTextureUrl);
                    renderThumbnails(); // Rerender to update active class
                    menuOpen = false;
                    menuToggleBtn.click(); // Close menu
                });

                envContainer.appendChild(button);
            });
        }

        // Hand tracking logic
        async function startHandTracking() {
            handTrackingActive = true;
            webcamToggleBtn.classList.add('bg-[#5282be]/15', 'border-[#5282be]/60', 'shadow-[0_0_30px_rgba(82,130,190,0.3)]');
            webcamBtnText.innerText = 'Exit Experience';
            webcamBtnText.classList.add('text-[#5282be]');
            pingRing.classList.remove('hidden');
            
            // Show webcam loader/panel
            webcamPanel.classList.remove('opacity-0', 'scale-90', 'pointer-events-none');
            webcamPanel.classList.add('opacity-100', 'scale-100');
            webcamLoader.classList.remove('hidden');

            instructionText.innerText = 'Initializing AI Engine...';
            updateLoader(10);

            try {
                // Initialize MediaPipe vision landmarker via dynamic import
                const { HandLandmarker, FilesetResolver } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.32/vision_bundle.mjs");
                const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.32/wasm');
                updateLoader(30);

                // Download model with progress simulation
                updateLoader(55);
                const response = await fetch('https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task');
                const contentLength = +(response.headers.get('Content-Length') || 0);
                const reader = response.body?.getReader();
                if (!reader) throw new Error('Failed to read model body');

                let receivedLength = 0;
                const chunks = [];
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    if (contentLength) {
                        const progress = 30 + Math.round((receivedLength / contentLength) * 50);
                        updateLoader(progress);
                    }
                }

                const modelBuffer = new Uint8Array(receivedLength);
                let position = 0;
                for(let chunk of chunks) {
                    modelBuffer.set(chunk, position);
                    position += chunk.length;
                }

                landmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetBuffer: modelBuffer,
                        delegate: 'GPU',
                    },
                    runningMode: 'VIDEO',
                    numHands: 1,
                    minHandDetectionConfidence: 0.5,
                });

                updateLoader(90);

                // Request camera permission
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 320, height: 240, facingMode: 'user' },
                    audio: false,
                });

                webcamStream = stream;
                webcamVideo.srcObject = stream;
                await webcamVideo.play();

                updateLoader(100);

                setTimeout(() => {
                    webcamLoader.classList.add('hidden');
                    statusIndicator.className = 'w-1.5 h-1.5 rounded-full bg-white/40 animate-pulse';
                    statusLabel.className = 'text-[10px] font-mono tracking-widest uppercase text-white/70';
                    statusLabel.innerText = 'Tracking...';
                    instructionText.innerText = 'Setup Complete • Show hand to track';
                    
                    // Show custom cursor
                    virtualCursor.classList.remove('hidden');

                    // Synchronize initial rotation angles
                    targetRotationX = camera.rotation.x;
                    targetRotationY = camera.rotation.y;

                    // Start loop prediction
                    predictHand();
                }, 500);

            } catch (err) {
                console.error('[HandTracker] startup failed:', err);
                statusIndicator.className = 'w-1.5 h-1.5 rounded-full bg-red-500';
                statusLabel.className = 'text-[10px] font-mono tracking-widest uppercase text-red-400';
                statusLabel.innerText = 'Error';
                instructionText.innerText = 'Camera or model failed to load';
            }
        }

        function stopHandTracking() {
            handTrackingActive = false;
            webcamToggleBtn.classList.remove('bg-[#5282be]/15', 'border-[#5282be]/60', 'shadow-[0_0_30px_rgba(82,130,190,0.3)]');
            webcamBtnText.innerText = 'use your webcam and play with hands';
            webcamBtnText.classList.remove('text-[#5282be]');
            pingRing.classList.add('hidden');

            // Hide webcam panel/cursor
            webcamPanel.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
            webcamPanel.classList.remove('opacity-100', 'scale-100');
            virtualCursor.classList.add('hidden');

            instructionText.innerText = 'DRAG TO ROTATE SCENE';

            // Clean resources
            if (rafId) cancelAnimationFrame(rafId);
            if (webcamStream) {
                webcamStream.getTracks().forEach(t => t.stop());
                webcamStream = null;
            }
            if (landmarker) {
                landmarker.close();
                landmarker = null;
            }
            handPos = null;
        }

        function updateLoader(pct) {
            loaderPercentage.innerText = `${pct}%`;
            loaderCircle.style.strokeDashoffset = 138 * (1 - pct / 100);
        }

        let lastVideoTime = -1;
        function predictHand() {
            if (!handTrackingActive || !landmarker || !webcamVideo) return;

            if (webcamVideo.currentTime !== lastVideoTime && webcamVideo.readyState >= 2) {
                lastVideoTime = webcamVideo.currentTime;
                const results = landmarker.detectForVideo(webcamVideo, performance.now());

                if (results.landmarks && results.landmarks.length > 0) {
                    const lm = results.landmarks[0][9]; // Palm middle joint
                    const indexTip = results.landmarks[0][8];
                    const thumbTip = results.landmarks[0][4];

                    const dist = Math.sqrt(Math.pow(indexTip.x - thumbTip.x, 2) + Math.pow(indexTip.y - thumbTip.y, 2));
                    const isPinching = dist < 0.05;

                    // Central 60% of camera maps to screen
                    const MARGIN = 0.2;
                    const range = 1 - 2 * MARGIN;
                    const rawX = Math.max(0, Math.min(1, ((1 - lm.x) - MARGIN) / range));
                    const rawY = Math.max(0, Math.min(1, (lm.y - MARGIN) / range));
                    
                    const x = rawX * 2 - 1;
                    const y = -(rawY * 2 - 1);

                    handPos = { x, y, isPinching };
                    handDetected = true;
                    statusIndicator.className = 'w-1.5 h-1.5 rounded-full bg-[#5282be] animate-pulse';
                    statusLabel.className = 'text-[10px] font-mono tracking-widest uppercase text-[#5282be]';
                    statusLabel.innerText = 'Hand Detected';

                    instructionText.innerText = 'Pinch to Rotate • Open hand to click';

                    // Update cursor rendering
                    updateCursor(x, y, isPinching);
                    
                    // Handle dwell click if not pinching
                    if (!isPinching) {
                        handleDwellClick(x, y);
                    } else {
                        // Reset hover element if pinching
                        cursorProgress.classList.add('hidden');
                        hoverElement = null;
                    }
                } else {
                    handDetected = false;
                    statusIndicator.className = 'w-1.5 h-1.5 rounded-full bg-white/20';
                    statusLabel.className = 'text-[10px] font-mono tracking-widest uppercase text-white/40';
                    statusLabel.innerText = 'Tracking...';
                    instructionText.innerText = 'Show hand to track';
                    
                    cursorRing.className = 'w-full h-full rounded-full border-2 border-white/20';
                    cursorProgress.classList.add('hidden');
                    hoverElement = null;
                }
            }

            rafId = requestAnimationFrame(predictHand);
        }

        function updateCursor(x, y, isPinching) {
            const screenX = (x + 1) / 2 * window.innerWidth;
            const screenY = (1 - (y + 1) / 2) * window.innerHeight;

            virtualCursor.style.left = `${screenX - 16}px`;
            virtualCursor.style.top = `${screenY - 16}px`;

            if (isPinching) {
                virtualCursor.style.transform = `scale(0.8)`;
                cursorRing.className = 'w-full h-full rounded-full border-2 border-[#5282be] bg-[#5282be]/20';
            } else {
                virtualCursor.style.transform = `scale(1)`;
                cursorRing.className = 'w-full h-full rounded-full border-2 border-white/50';
            }
        }

        function handleDwellClick(x, y) {
            const screenX = (x + 1) / 2 * window.innerWidth;
            const screenY = (1 - (y + 1) / 2) * window.innerHeight;

            const element = document.elementFromPoint(screenX, screenY);
            if (element && (element.tagName === 'BUTTON' || element.closest('button') || element.closest('.group'))) {
                const target = (element.closest('button') || element.closest('.group'));
                
                if (target !== hoverElement) {
                    hoverElement = target;
                    hoverStartTime = Date.now();
                    cursorProgress.classList.remove('hidden');
                } else {
                    const elapsed = Date.now() - hoverStartTime;
                    
                    if (elapsed > 600) {
                        if (Date.now() - lastClickTime > 1000) {
                            target.click();
                            lastClickTime = Date.now();
                            hoverElement = null;
                            cursorProgress.classList.add('hidden');
                        }
                    }
                }
            } else {
                hoverElement = null;
                cursorProgress.classList.add('hidden');
            }
        }

        // Initialize App
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', () => {
                initThree();
                initUI();
            });
        } else {
            initThree();
            initUI();
        }
    </script>
</body>

</html>
