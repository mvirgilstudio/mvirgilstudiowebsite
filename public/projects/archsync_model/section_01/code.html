<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="keywords" content="miguel, virgilio, virgílio, miguel virgilio, miguel virgílio, miguel vfx, miguel virgilio studio, miguel virgílio studio, miguel studio, virgílio studio, virgilio studio, immersive, interactive, archviz, 3d animation, web creative coding, ai, 3D Modeling, Animation, 3D Tracking &amp; VFX, Video/Image Composition, Web &amp; Creative Coding, m virgil, mvirgil, virgil, virgil studio, studio, m virgil studio, mvirgil studio, alcobaça, alcobaca" />

<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Fonts: Using Hanken Grotesk as requested -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Hanken Grotesk', 'sans-serif'],
          },
          colors: {
            'electric-cyan': '#00E5FF',
            'matte-black': '#121212',
            'soft-grey': '#E5E7EB',
          },
          letterSpacing: {
            'precise': '0.025em',
            'wide-precise': '0.05em',
          }
        }
      }
    }
  </script>
<!-- Custom Styles for Specific UI Elements -->
<style data-purpose="global-layout">
    body {
      background-color: #0c0c0c;
      overflow: hidden;
      font-feature-settings: "cv02", "cv03", "cv04", "ss01";
    }
    
    /* Grid background effect */
    .grid-overlay {
      background-image: 
        linear-gradient(to right, rgba(0, 229, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
<style data-purpose="glassmorphism">
    .glass-panel {
      background: rgba(20, 20, 20, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
  </style>
<style data-purpose="ui-components">
    /* Custom Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #2D2D2D;
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #00E5FF; }
    input:checked + .slider:before { transform: translateX(22px); }

    /* Material Swatches */
    .material-swatch {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .material-swatch.active {
      border-color: #00E5FF;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
    }
  </style>
</head>
<body class="text-white font-sans antialiased min-h-screen flex flex-col p-8 relative">
<!-- Background Grid Effect -->
<div class="fixed inset-0 grid-overlay pointer-events-none z-0"></div>
<!-- BEGIN: BrandingHeader -->
<header class="relative z-10 mb-8">
<h1 class="text-3xl font-medium tracking-precise">Digital Twin Interactive Viewer</h1>
<p class="text-soft-grey text-lg opacity-70 tracking-wide-precise">ArchSync Model</p>
</header>
<!-- END: BrandingHeader -->
<!-- BEGIN: MainViewer -->
<main class="flex-grow relative rounded-2xl overflow-hidden border-4 border-electric-cyan/20 group">
<!-- Main Render Image -->
<img alt="Architectural Digital Twin" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uh9QpVp01JrW2_yTbA3sqAaG1EUg5h8BKOMzC5WZskLVJi3zt4R7tPsNxr6xEFh0rr2GhaWMaM67WmcEm0yUzBD2wqsx9fvrbISrmNmK0xmCvRTl6ZWCbMRWN6Zz7kTE-vB0LUmnaXsaecDpHoTk8xsUugFLjRooVnee4HJKI_hGgpKyImeuvI86JI2IMnylGMomzKFY9qCmWWITrhBwrzriAf-HpvcVeiXBd5kSreeeZKIKk4-qvn0Um0"/>
<!-- BEGIN: SyncControlsPanel -->
<aside class="glass-panel absolute right-6 top-6 bottom-6 w-80 rounded-xl p-6 flex flex-col space-y-8 text-sm" data-purpose="controls-panel">
<div class="text-center">
<h2 class="text-white/90 font-semibold text-base uppercase tracking-widest">Sync Controls</h2>
</div>
<!-- Lighting Toggle -->
<section data-purpose="lighting-control">
<label class="block text-soft-grey mb-3 font-medium">Lighting</label>
<div class="flex items-center justify-center gap-4 bg-black/30 p-3 rounded-lg">

<label class="switch">
<input checked="" type="checkbox"/>
<span class="slider"></span>
</label>
<span class="text-xs font-semibold">Night</span>
</div>
</section>
<!-- Material Switcher -->
<section data-purpose="material-switcher">
<label class="block text-soft-grey mb-4 font-medium">Material Switcher</label>
<div class="flex justify-between px-2">
<div class="flex flex-col items-center gap-2">
<div class="material-swatch bg-gray-400" title="Concrete"></div>
<span class="text-[10px] text-soft-grey/60 uppercase tracking-tighter">Concrete</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="material-swatch bg-amber-800" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBDZheS6WfsLgQuZLa3LB5qeQHDaCYSd-ewKbSDIUsBmNAWgPYLUDmfB5E3TOOR9SvNm3yb5QV4ZQFS-IRl-RYyrcdMVaNQxLLnQR1X2wf0iT_ZssnCqaHm_qV3R_3ap6If_IvfFAHRiylKeUNxzj4AGE81VSHmvJUK9jqM7HzW1vk6njb_3YU5Kly5QaqYMSNCC8rUxFSzftaeuivrFpcOp2iPOCTJ7A9q1UKQtHnYGZmYqQaOEp8TYIH-cGFHQAfM6AIgIUcqA7s'); background-size: cover;" title="Wood"></div>
<span class="text-[10px] text-soft-grey/60 uppercase tracking-tighter">Wood</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="material-swatch bg-white active" title="White Plaster"></div>
<span class="text-[10px] text-soft-grey/60 uppercase tracking-tighter">White Plaster</span>
</div>
</div>
</section>
<!-- Sync Simulation -->
<section class="flex-grow flex flex-col" data-purpose="sync-simulation">
<label class="block text-soft-grey mb-3 font-medium">Sync Simulation</label>
<div class="relative rounded-lg overflow-hidden flex-grow min-h-[140px] border border-white/10 mb-6 bg-black/40">
<!-- Mini Map Simulation Placeholder -->
<img alt="Simulation Feed" class="w-full h-full object-cover opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxRHj5S9Ch01535xn_YQal-T5WJrLRhEyMQpD1Oe1BKQBZgK5iH6CZpRLNy8q2GgfFuYbPO-swgDjhyAe9T4jlrKV4xwd8-eywUzmsirLVn8I7EL0X9vk1VVNiKjF_VhpSTPaF_0CHP9Ll8New4pzakmYI7wh8mYxE4jvf3tOANryy0q1tiUNzCeDDpEmUpp_K12FgKXUCouUqwNDOF9sgtNEpRkzcHhq6S5nznz2Fd_IUrrfPHeDLYY-1hfioi6ENxXGTsvUZCkA"/>
<!-- Simulation Indicator Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-full h-full p-4">
<div class="border-2 border-dashed border-electric-cyan/40 w-full h-full rounded flex items-center justify-center">
<span class="text-[10px] text-electric-cyan animate-pulse">LIVE DATA LINK</span>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-3 bg-matte-black border border-electric-cyan text-electric-cyan hover:bg-electric-cyan hover:text-matte-black transition-all duration-300 font-bold text-xs tracking-widest rounded uppercase" id="btn-start-sync">
          Start Sync
        </button>
</section>
</aside>
<!-- END: SyncControlsPanel -->
<!-- Dynamic Overlay for Cinematic Feel -->
<div class="absolute bottom-4 left-4 flex gap-2">
<div class="px-2 py-1 bg-black/60 rounded text-[10px] border border-white/10">60 FPS</div>
<div class="px-2 py-1 bg-black/60 rounded text-[10px] border border-white/10 text-electric-cyan">LIVE STREAM</div>
</div>
</main>
<!-- END: MainViewer -->
<!-- BEGIN: MainFooter -->
<footer class="relative z-10 pt-8 flex items-center">
<div class="flex items-center gap-3">
<!-- Simple CSS Logo -->
<div class="flex items-center gap-1">
<div class="w-3 h-3 bg-electric-cyan rotate-45"></div>
<div class="w-2 h-2 bg-white/40 rounded-full"></div>
</div>
<span class="text-soft-grey font-medium tracking-wide-precise">ArchSync System</span>
</div>
</footer>
<!-- END: MainFooter -->
<!-- BEGIN: InteractiveHandlers -->
<script data-purpose="event-handlers">
    document.getElementById('btn-start-sync').addEventListener('click', function() {
      this.innerText = (this.innerText === 'START SYNC') ? 'SYNCING...' : 'START SYNC';
      this.classList.toggle('bg-electric-cyan');
      this.classList.toggle('text-matte-black');
    });

    // Simple Material Swatch Selection Logic
    const swatches = document.querySelectorAll('.material-swatch');
    swatches.forEach(swatch => {
      swatch.addEventListener('click', () => {
        swatches.forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
      });
    });
  </script>
<!-- END: InteractiveHandlers -->
</body></html>
